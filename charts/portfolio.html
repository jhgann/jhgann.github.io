<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Custom Chart.js in Glide</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FFFFFF;
            font-size: 14px;
        }
        
        #legend-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin: 0 15px 5px 0;
        }
        .legend-color {
            width: 15px;
            height: 20px;
            margin-right: 5px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
        <canvas id="myChart"></canvas>
        <div id="legend-container"></div>

    <script>
            var ctx = document.getElementById('myChart').getContext('2d');

            var chartData = {
                labels: ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'],
                datasets: [{
                    label: 'Number of Buildings',
                    data: [ 0, 0, 0, 0, 0, 1, 3, 0],
                    backgroundColor: [
                        '#28a745', // A+ (green)
                        '#8bc34a', // B
                        '#cddc39', // C
                        '#ffeb3b', // D
                        '#ffc107', // E
                        '#ff9800', // F (orange)
                        '#ff5722', // G (red)
                        '#b71c1c'  // H (dark red)
                    ],
                    borderColor: [
                        '#28a745',
                        '#8bc34a',
                        '#cddc39',
                        '#ffeb3b',
                        '#ffc107',
                        '#ff9800',
                        '#ff5722',
                        '#b71c1c'
                    ],
                    borderWidth: 1,
                    borderRadius: 10, // Rounded corners
                    barThickness: 'flex', // Flex bar thickness
                    hoverBackgroundColor: [
                        '#28a745',
                        '#8bc34a',
                        '#cddc39',
                        '#ffeb3b',
                        '#ffc107',
                        '#ff9800',
                        '#ff5722',
                        '#b71c1c'
                    ],
                    hoverBorderColor: [
                        '#28a745',
                        '#8bc34a',
                        '#cddc39',
                        '#ffeb3b',
                        '#ffc107',
                        '#ff9800',
                        '#ff5722',
                        '#b71c1c'
                    ]
                }]
            };

            let delayed;

            var myChart = new Chart(ctx, {
                type: 'bar',
                data: chartData,
                options: {
                    animation: {
                        onComplete: () => {
                            delayed = true;
                        },
                        delay: (context) => {
                            let delay = 0;
                            if (context.type === 'data' && context.mode === 'default' && !delayed) {
                            delay = context.dataIndex * 300 + context.datasetIndex * 100;
                            }
                            return delay;
                        },
                    },
                    scales: {
                        y: {
                            title: {
                                display: true,
                                text: 'Number of Buildings'
                            },
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return Number.isInteger(value) ? value : ''; // Only show whole numbers
                                }
                            },
                            grace: '10%',
                            grid: {
                                drawBorder: false,
                                color: function(context) {
                                    if (context.tick.value % 1 === 0) {
                                        return 'rgba(0, 0, 0, 0.1)'; // Only show grid lines on whole numbers
                                    }
                                    return 'rgba(0, 0, 0, 0)';
                                }
                            }
                        },
                        x: {
                            grid: {
                                display: false // Remove vertical grid lines
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false // Hide default legend
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.7)',
                            titleFont: {
                                size: 16,
                                weight: 'bold'
                            },
                            bodyFont: {
                                size: 14
                            },
                            bodySpacing: 6,
                            cornerRadius: 4
                        }
                    },
                    layout: {
                        padding: 10 // Padding for a cleaner look
                    },
                }
            });

            // Custom legend
            var legendContainer = document.getElementById('legend-container');
            chartData.labels.forEach(function(label, index) {
                var legendItem = document.createElement('div');
                legendItem.classList.add('legend-item');

                var legendColor = document.createElement('div');
                legendColor.classList.add('legend-color');
                legendColor.style.backgroundColor = chartData.datasets[0].backgroundColor[index];

                var legendLabel = document.createElement('div');
                legendLabel.classList.add('legend-label');
                legendLabel.textContent = label;

                legendItem.appendChild(legendColor);
                legendItem.appendChild(legendLabel);
                legendContainer.appendChild(legendItem);
            });
    </script>
</body>
</html>
