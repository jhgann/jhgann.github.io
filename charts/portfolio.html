<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Chart.js in Glide</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FFFFFF; /* Set body background to white */
            color: #2D3535;
            font-size: 16px; /* Increased font size */
        }
        #chart-container {
            width: 80%;
            margin: 0 auto;
            position: relative;
        }
        canvas {
            background-color: #FFFFFF; /* Set chart background to white */
        }
        #chart-title {
            position: absolute;
            top: -30px;
            left: 0;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="chart-container">
        <div id="chart-title">Energy Efficiency Class</div>
        <canvas id="myChart" width="400" height="400"></canvas>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var ctx = document.getElementById('myChart').getContext('2d');

            var chartData = {
                labels: ['A+', 'A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'],
                datasets: [{
                    label: 'A+', data: [0], backgroundColor: '#28a745', borderColor: '#28a745', borderWidth: 1, borderRadius: 10,
                },{
                    label: 'A', data: [0], backgroundColor: '#5cb85c', borderColor: '#5cb85c', borderWidth: 1, borderRadius: 10,
                },{
                    label: 'B', data: [0], backgroundColor: '#8bc34a', borderColor: '#8bc34a', borderWidth: 1, borderRadius: 10,
                },{
                    label: 'C', data: [0], backgroundColor: '#cddc39', borderColor: '#cddc39', borderWidth: 1, borderRadius: 10,
                },{
                    label: 'D', data: [0], backgroundColor: '#ffeb3b', borderColor: '#ffeb3b', borderWidth: 1, borderRadius: 10,
                },{
                    label: 'E', data: [0], backgroundColor: '#ffc107', borderColor: '#ffc107', borderWidth: 1, borderRadius: 10,
                },{
                    label: 'F', data: [1], backgroundColor: '#ff9800', borderColor: '#ff9800', borderWidth: 1, borderRadius: 10,
                },{
                    label: 'G', data: [3], backgroundColor: '#ff5722', borderColor: '#ff5722', borderWidth: 1, borderRadius: 10,
                },{
                    label: 'H', data: [0], backgroundColor: '#b71c1c', borderColor: '#b71c1c', borderWidth: 1, borderRadius: 10,
                }]
            };

            var myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: chartData.labels,
                    datasets: chartData.datasets
                },
                options: {
                    scales: {
                        y: {
                            beginAtZero: true,
                            suggestedMax: 5, // Add buffer above the topmost bar
                            ticks: {
                                callback: function(value) {
                                    return Number.isInteger(value) ? value : ''; // Only show whole numbers
                                }
                            },
                            grid: {
                                drawBorder: false,
                                color: function(context) {
                                    if (context.tick.value % 1 === 0) {
                                        return 'rgba(0, 0, 0, 0.1)'; // Only show grid lines on whole numbers
                                    }
                                    return 'rgba(0, 0, 0, 0)';
                                }
                            }
                        },
                        x: {
                            grid: {
                                display: false // Remove vertical grid lines
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'bottom', // Move legend to the bottom
                            labels: {
                                generateLabels: function(chart) {
                                    var data = chart.data;
                                    if (data.datasets.length) {
                                        return data.datasets.map(function(dataset, i) {
                                            return {
                                                text: dataset.label,
                                                fillStyle: dataset.backgroundColor,
                                                hidden: !chart.isDatasetVisible(i),
                                                lineCap: dataset.borderCapStyle,
                                                lineDash: dataset.borderDash,
                                                lineDashOffset: dataset.borderDashOffset,
                                                lineJoin: dataset.borderJoinStyle,
                                                lineWidth: dataset.borderWidth,
                                                strokeStyle: dataset.borderColor,
                                                pointStyle: dataset.pointStyle,
                                                rotation: 0,
                                                datasetIndex: i
                                            };
                                        });
                                    }
                                    return [];
                                },
                                font: {
                                    size: 16, // Increase font size of legend
                                    weight: 'bold' // Bold legend text
                                }
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.7)',
                            titleFont: {
                                size: 16,
                                weight: 'bold'
                            },
                            bodyFont: {
                                size: 14
                            },
                            bodySpacing: 6,
                            cornerRadius: 4
                        }
                    },
                    layout: {
                        padding: 20 // Padding for a cleaner look
                    }
                }
            });
        });
    </script>
</body>
</html>
