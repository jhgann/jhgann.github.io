<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Chart.js in Glide</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FFFFFF; /* Set body background to white */
            color: #2D3535;
            font-size: 16px; /* Increased font size */
        }
        #chart-container {
            width: 90%;
            margin: 0 auto;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        canvas {
            background-color: #FFFFFF; /* Set chart background to white */
        }
        #chart-title {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }
        #legend-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            margin-right: 5px;
        }
        .legend-label {
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="chart-container">
        <div id="chart-title">Energy Efficiency Class</div>
        <canvas id="myChart"></canvas>
        <div id="legend-container"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var ctx = document.getElementById('myChart').getContext('2d');

            var chartData = {
                labels: ['A+', 'A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'],
                datasets: [{
                    label: 'Energy Efficiency Class',
                    data: [0, 0, 0, 0, 0, 0, 1, 3, 0],
                    backgroundColor: [
                        '#28a745', // A+ (green)
                        '#5cb85c', // A
                        '#8bc34a', // B
                        '#cddc39', // C
                        '#ffeb3b', // D
                        '#ffc107', // E
                        '#ff9800', // F (orange)
                        '#ff5722', // G (red)
                        '#b71c1c'  // H (dark red)
                    ],
                    borderColor: [
                        '#28a745',
                        '#5cb85c',
                        '#8bc34a',
                        '#cddc39',
                        '#ffeb3b',
                        '#ffc107',
                        '#ff9800',
                        '#ff5722',
                        '#b71c1c'
                    ],
                    borderWidth: 1,
                    borderRadius: 10, // Rounded corners
                    barThickness: 'flex', // Flex bar thickness
                    hoverBackgroundColor: [
                        '#28a745',
                        '#5cb85c',
                        '#8bc34a',
                        '#cddc39',
                        '#ffeb3b',
                        '#ffc107',
                        '#ff9800',
                        '#ff5722',
                        '#b71c1c'
                    ],
                    hoverBorderColor: [
                        '#28a745',
                        '#5cb85c',
                        '#8bc34a',
                        '#cddc39',
                        '#ffeb3b',
                        '#ffc107',
                        '#ff9800',
                        '#ff5722',
                        '#b71c1c'
                    ]
                }]
            };

            var myChart = new Chart(ctx, {
                type: 'bar',
                data: chartData,
                options: {
                    scales: {
                        y: {
                            beginAtZero: true,
                            suggestedMax: 5, // Add buffer above the topmost bar
                            ticks: {
                                callback: function(value) {
                                    return Number.isInteger(value) ? value : ''; // Only show whole numbers
                                }
                            },
                            grid: {
                                drawBorder: false,
                                color: function(context) {
                                    if (context.tick.value % 1 === 0) {
                                        return 'rgba(0, 0, 0, 0.1)'; // Only show grid lines on whole numbers
                                    }
                                    return 'rgba(0, 0, 0, 0)';
                                }
                            }
                        },
                        x: {
                            grid: {
                                display: false // Remove vertical grid lines
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false // Hide default legend
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.7)',
                            titleFont: {
                                size: 16,
                                weight: 'bold'
                            },
                            bodyFont: {
                                size: 14
                            },
                            bodySpacing: 6,
                            cornerRadius: 4
                        }
                    },
                    layout: {
                        padding: 20 // Padding for a cleaner look
                    }
                }
            });

            // Custom legend
            var legendContainer = document.getElementById('legend-container');
            chartData.labels.forEach(function(label, index) {
                var legendItem = document.createElement('div');
                legendItem.classList.add('legend-item');

                var legendColor = document.createElement('div');
                legendColor.classList.add('legend-color');
                legendColor.style.backgroundColor = chartData.datasets[0].backgroundColor[index];

                var legendLabel = document.createElement('div');
                legendLabel.classList.add('legend-label');
                legendLabel.textContent = label;

                legendItem.appendChild(legendColor);
                legendItem.appendChild(legendLabel);
                legendContainer.appendChild(legendItem);
            });
        });
    </script>
</body>
</html>
