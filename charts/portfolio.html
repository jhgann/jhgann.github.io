<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Chart.js in Glide</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ECF4F4;
            color: #2D3535;
        }
        #chart-container {
            width: 80%;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div id="chart-container">
        <canvas id="myChart" width="400" height="400"></canvas>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var ctx = document.getElementById('myChart').getContext('2d');

            var chartData = {
                labels: ['A+', 'A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'],
                datasets: [{
                    label: 'Sample Data',
                    data: [7, 6, 5, 4, 3, 2, 1, 3, 0],
                    backgroundColor: [
                        '#28a745', // A+ (green)
                        '#5cb85c', // A
                        '#8bc34a', // B
                        '#cddc39', // C
                        '#ffeb3b', // D
                        '#ffc107', // E
                        '#ff9800', // F (orange)
                        '#ff5722', // G (red)
                        '#b71c1c'  // H (dark red)
                    ],
                    borderColor: [
                        '#28a745',
                        '#5cb85c',
                        '#8bc34a',
                        '#cddc39',
                        '#ffeb3b',
                        '#ffc107',
                        '#ff9800',
                        '#ff5722',
                        '#b71c1c'
                    ],
                    borderWidth: 1
                }]
            };

            var myChart = new Chart(ctx, {
                type: 'bar',
                data: chartData,
                options: {
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>
